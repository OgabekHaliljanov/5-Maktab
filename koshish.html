<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./koshish.css">
</head>
<body>
    <button id="openModalBtn" class="styled-btn">Добавить учителя</button>
    <a href="./index.html"><button class="styled-btn">вернутса назад</button></a>

    <div id="teacherModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Добавить учителя</h2>
            <form id="teacherForm">
                <label for="teacherName">Ф.И.О.:</label>
                <input type="text" id="teacherName" name="teacherName" required>
                
                <label for="teacherPosition">Должность:</label>
                <input type="text" id="teacherPosition" name="teacherPosition" required>
                
                <label for="teacherExperience">Стаж (лет):</label>
                <input type="number" id="teacherExperience" name="teacherExperience" required>
                
                <button type="submit" class="styled-btn">Добавить</button>
            </form>
        </div>
    </div>

    <h2>Список учителей</h2>
    <table id="teacherTable" class="styled-table">
        <thead>
            <tr>
                <th>№</th>
                <th>Ф.И.О.</th>
                <th>Должность</th>
                <th>Стаж</th>
             
            </tr>
        </thead>
        <tbody id="teacherList">
            <!-- Data will be dynamically inserted here -->
        </tbody>
    </table>

    <script src="./koshish.js"></script>
</body>
</html>
